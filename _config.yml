    description: "**Atos acquired Cloudreach** in 2022. Shortly after, I  took ownership of a newly formed workstream, **leding a team of four engineers** through the proposal, planning and delivery of infrastructure automation projects across AWS and Azure.<br/> My **most impactful solo project** was a resource cleanup automation for an AWS client in the retirement market, which **reduced >$10,000 in monthly costs** by idenifying and removing hundreds of unused resources across 3 accounts in the first month of being deployed. <br/> My **most recent team project** was a **greenfield migration from Signalfx to Dynatrace**, an alerting solution used by 30+ clients in production. This involved building configuration as code, detectors, alerting integrations and workflows from scratch."
