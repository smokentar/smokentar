    to_year: "Present"
  - employer: "Cloudreach"
    employer_url: "https://cloudreach.com"
    image: "/images/cloudreach.png"
    description: "I started as an **Associate Cloud Engineer** at **Cloudreach**, responsible for reactive support of cloud infrastructure, including incident response, patching, monitoring and backups. <br/> I was promoted to a **Cloud Engineer** within my first year, shifting to a more proactive role, involving infrastructure as code, automation, and security hardening."
